                    const bg = isTBC ? "#FFF9E6" : ri % 2 === 0 ? "#FAFAFA" : "white";
                    return React.createElement("tr", {
                      key: ri,
                      style: { background: bg, borderBottom: `1px solid ${SRG_BORDER}` }
                    },
                      React.createElement("td", {
                        style: { padding: "8px 12px", fontWeight: 700, color: isTBC ? RM : SRG_DARK, whiteSpace: "nowrap", position: "sticky", left: 0, background: bg, zIndex: 1, fontSize: 11 }
                      }, r.name),
                      React.createElement("td", { style: { padding: "8px", color: SRG_GREY, whiteSpace: "nowrap", fontSize: 10 } }, r.role),
                      React.createElement("td", { style: { padding: "8px", color: SRG_GREY, fontSize: 9, fontStyle: "italic" } }, r.notes),
                      r.codes.map((c, ci) => {
                        let bgC = "transparent", fgC = SRG_GREY;
                        if (c === "DS") { bgC = "#E8F0FE"; fgC = "#1E40AF"; }
                        else if (c === "NS") { bgC = SRG_DARK; fgC = "white"; }
                        else if (c === "FIA" || c === "DIP") { bgC = "#DCFCE7"; fgC = "#166534"; }
                        else if (c === "FOP" || c === "FOA" || c === "DOP") { bgC = "#FEF3C7"; fgC = "#92400E"; }
                        return React.createElement("td", {
                          key: ci,
                          style: {
                            padding: "6px 2px",
                            textAlign: "center",
                            borderLeft: `1px solid ${SRG_BORDER}`,
                            background: bgC,
                            color: fgC,
                            fontWeight: 700,
                            fontSize: 9
                          }
                        }, c);
                      })
                    );
                  })
                )
              )
            ),

            React.createElement("div", {
              style: { marginTop: 16, padding: 14, background: "white", borderLeft: `3px solid ${SRG_RED}`, fontSize: 11, color: SRG_GREY, border: `1px solid ${SRG_BORDER}` }
            },
              React.createElement("span", { style: { fontWeight: 700, color: SRG_DARK } }, "Shift Codes: "),
              "DS = Day Shift, NS = Night Shift, FIA = Fly In AM, FOP = Fly Out PM, FOA = Fly Out AM, DIP = Drive In PM, DOP = Drive Out PM. Roster as supplied by Covalent shutdown team. Source of truth: Covalent Shutdown Roster.xlsx."
            )
          ),

          // Footer
          React.createElement("div", {
            style: {
              marginTop: 40,
              padding: "20px 0",
              borderTop: `1px solid ${SRG_BORDER}`,
              display: "flex",
              justifyContent: "space-between",
              fontSize: 10,
              color: "#B0B0B0",
              textTransform: "uppercase",
              letterSpacing: 0.5,
              flexWrap: "wrap",
              gap: 8
            }
          },
            React.createElement("span", null, "SRG Global Integrated Services Pty Ltd · ABN 86 604 010 639"),
            React.createElement("span", null, `Generated ${new Date().toLocaleDateString("en-AU")} · Covalent Lithium Shutdown Apr–May 2026`)
          )
        )
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));
  </script>

</body>
